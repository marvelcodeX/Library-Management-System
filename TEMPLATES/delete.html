{% extends "base.html" %}

{% block title %}Delete Book | BookWise Library{% endblock %}

{% block content %}
<section class="form-wrap">
    <div>
        <p class="lede">Catalog maintenance</p>
        <h1 class="page-title">Remove a book.</h1>
        <p class="lede">
            Delete by accession number. Issued books are protected from deletion
            until they are returned.
        </p>
    </div>

    <form class="form-card" action="{{ url_for('delete_book') }}" method="post">
        <h2>Delete record</h2>
        <div class="field">
            <label for="ac_no">Accession No</label>
            <input type="text" id="ac_no" name="ac_no" required>
        </div>

        <div class="button-row">
            <button class="btn btn-danger" type="submit">Delete book</button>
            <a class="btn btn-secondary" href="{{ url_for('home') }}">Back to dashboard</a>
        </div>
    </form>
</section>
{% endblock %}
