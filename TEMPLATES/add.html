{% extends "base.html" %}

{% block title %}Add Book | BookWise Library{% endblock %}

{% block content %}
<section class="form-wrap">
    <div>
        <p class="lede">Catalog entry</p>
        <h1 class="page-title">Add a book.</h1>
        <p class="lede">
            Add one accessioned copy at a time. New records are marked available
            automatically.
        </p>
    </div>

    <form class="form-card" action="{{ url_for('add_book') }}" method="post">
        <h2>Book details</h2>
        <div class="field-grid">
            <div class="field">
                <label for="sl_no">SL No</label>
                <input type="text" id="sl_no" name="sl_no" required>
            </div>

            <div class="field">
                <label for="ac_no">Accession No</label>
                <input type="text" id="ac_no" name="ac_no" required>
            </div>

            <div class="field full">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" required>
            </div>

            <div class="field">
                <label for="author">Author</label>
                <input type="text" id="author" name="author" required>
            </div>

            <div class="field">
                <label for="edition">Edition / Year</label>
                <input type="text" id="edition" name="edition" required>
            </div>

            <div class="field full">
                <label for="publication">Publication</label>
                <input type="text" id="publication" name="publication" required>
            </div>
        </div>

        <div class="button-row">
            <button class="btn" type="submit">Add book</button>
            <a class="btn btn-secondary" href="{{ url_for('home') }}">Back to dashboard</a>
        </div>
    </form>
</section>
{% endblock %}
